<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Donki Care Log</title>
  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; line-height: 1.6; }
    body { margin: 0; background: #f5f5f7; color: #222; }
    .page { max-width: 860px; margin: 0 auto; padding: 28px 24px 56px; }
    .card { background: #fff; border-radius: 14px; padding: 18px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 18px; }
    h1 { margin: 0 0 6px; font-size: 1.7rem; }
    h2 { margin: 0 0 10px; font-size: 1.2rem; }
    p { margin: 6px 0; }
    .small { font-size: 0.9rem; color: #666; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    a { color: #1d5bbf; text-decoration: none; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
    th, td { border: 1px solid #e0e0e0; padding: 8px 10px; vertical-align: top; text-align: left; }
    th { background: #fafafa; font-weight: 600; }
    input[type="text"], textarea { width: 100%; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 10px; font: inherit; background: #fff; }
    input[type="checkbox"] { width: 20px; height: 20px; accent-color: #1d5bbf; }
    textarea { min-height: 90px; resize: vertical; }
    .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    button { border: 0; background: #1d5bbf; color: #fff; padding: 9px 15px; border-radius: 10px; cursor: pointer; font: inherit; font-weight: 600; }
    button:disabled { opacity: 0.65; cursor: wait; }
    .status { font-size: 0.92rem; color: #555; }
    .alert { background: #fff8e1; border-left: 3px solid #ffb300; padding: 8px 10px; font-size: 0.92rem; margin-top: 12px; }
    @media (max-width: 680px) { .page { padding: 20px 14px 44px; } table { font-size: 0.88rem; } th, td { padding: 7px; } }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a href="./index.html">← Back to Donki guide</a>
      <span class="small">Donki care log</span>
    </div>

    <section class="card">
      <h1>📝 Donki 排尿 / 用药记录</h1>
      <p class="small">输入会自动保存在当前浏览器；点击保存后，会通过服务器端 API 写入 GitHub 的 <code>data/care-log.json</code>。</p>
      <div class="alert">不要把 GitHub token 放在网页代码里。请只在 Netlify/Vercel 环境变量中配置 <code>DONKI_GITHUB_TOKEN</code>。</div>
    </section>

    <section class="card">
      <h2>2026/06/26 – 2026/06/27</h2>
      <table aria-label="Donki care log">
        <tr>
          <th>日期</th>
          <th>早上尿尿时间</th>
          <th>下午/晚上尿尿时间</th>
          <th>Prednisolone</th>
        </tr>
        <tr>
          <td>2026/06/26</td>
          <td><input type="text" name="pee_0626_morning" placeholder="例如：07:30 / 未看到" /></td>
          <td><input type="text" name="pee_0626_evening" placeholder="例如：20:10 / 未看到" /></td>
          <td><label><input type="checkbox" name="pred_0626" /> 已喂</label></td>
        </tr>
        <tr>
          <td>2026/06/27</td>
          <td><input type="text" name="pee_0627_morning" placeholder="例如：07:30 / 未看到" /></td>
          <td><input type="text" name="pee_0627_evening" placeholder="例如：20:10 / 未看到" /></td>
          <td><label><input type="checkbox" name="pred_0627" /> 已喂</label></td>
        </tr>
      </table>

      <p class="small">补充说明</p>
      <textarea name="notes" placeholder="例如：今天精神状态、便便、食欲、是否接近 24 小时没尿尿等"></textarea>

      <div class="actions">
        <button id="save-care-log" type="button">保存记录到 GitHub</button>
        <span class="status" id="save-care-log-status">输入会先自动保存在本机。</span>
      </div>
    </section>
  </main>

  <script>
    const CARE_LOG_STORAGE_KEY = "donki_care_log_draft";
    const CARE_LOG_ENDPOINTS = ["/.netlify/functions/save-care-log", "/api/care-log"];

    function fields() {
      return {
        "2026-06-26": {
          morning_pee: document.querySelector('[name="pee_0626_morning"]'),
          evening_pee: document.querySelector('[name="pee_0626_evening"]'),
          prednisolone_given: document.querySelector('[name="pred_0626"]'),
        },
        "2026-06-27": {
          morning_pee: document.querySelector('[name="pee_0627_morning"]'),
          evening_pee: document.querySelector('[name="pee_0627_evening"]'),
          prednisolone_given: document.querySelector('[name="pred_0627"]'),
        },
      };
    }

    function collectPayload() {
      const dates = {};
      Object.entries(fields()).forEach(([date, row]) => {
        dates[date] = {
          morning_pee: row.morning_pee?.value?.trim() || "",
          evening_pee: row.evening_pee?.value?.trim() || "",
          prednisolone_given: Boolean(row.prednisolone_given?.checked),
        };
      });
      return { dates, notes: document.querySelector('[name="notes"]')?.value?.trim() || "" };
    }

    function saveDraft() {
      localStorage.setItem(CARE_LOG_STORAGE_KEY, JSON.stringify(collectPayload()));
    }

    function restoreDraft() {
      const raw = localStorage.getItem(CARE_LOG_STORAGE_KEY);
      if (!raw) return;
      try {
        const draft = JSON.parse(raw);
        Object.entries(fields()).forEach(([date, row]) => {
          const saved = draft.dates?.[date] || {};
          if (row.morning_pee) row.morning_pee.value = saved.morning_pee || "";
          if (row.evening_pee) row.evening_pee.value = saved.evening_pee || "";
          if (row.prednisolone_given) row.prednisolone_given.checked = Boolean(saved.prednisolone_given);
        });
        const notes = document.querySelector('[name="notes"]');
        if (notes) notes.value = draft.notes || "";
      } catch (error) {
        console.warn("Could not restore Donki care log draft", error);
      }
    }

    function bindDraftSave() {
      document.querySelectorAll("input, textarea").forEach((el) => {
        el.addEventListener("input", saveDraft);
        el.addEventListener("change", saveDraft);
      });
    }

    async function saveToGitHub() {
      const button = document.getElementById("save-care-log");
      const status = document.getElementById("save-care-log-status");
      button.disabled = true;
      status.textContent = "保存中...";
      try {
        let lastError = "";
        for (const endpoint of CARE_LOG_ENDPOINTS) {
          try {
            const response = await fetch(endpoint, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(collectPayload()),
            });
            if (response.ok) {
              status.textContent = "已保存到 GitHub。";
              return;
            }
            lastError = await response.text();
          } catch (error) {
            lastError = error.message;
          }
        }
        throw new Error(lastError || "Save failed");
      } catch (error) {
        status.textContent = "保存失败：" + error.message;
      } finally {
        button.disabled = false;
      }
    }

    restoreDraft();
    bindDraftSave();
    document.getElementById("save-care-log")?.addEventListener("click", saveToGitHub);
  </script>
</body>
</html>
